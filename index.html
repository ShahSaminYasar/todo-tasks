<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO Task List</title>
    <!-- Link FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header id="header">
      <div class="container">
        <h1>TODO List</h1>
      </div>
    </header>

    <!-- MAIN -->
    <main id="main">
      <div class="container">
        <form id="todo_form">
          <input
            id="todo_form_input"
            type="text"
            placeholder="Write your todo task"
          />
          <button onclick="addToList(event)">Add to list</button>
        </form>
        <div class="todo_tasks">
          <!-- <div class="todo_task">
            <p>Sample TODO Task</p>
            <button><i class="fa-solid fa-trash"></i></button>
          </div> -->
        </div>
      </div>
      <div class="confirmation_modal">
        <span>Are you sure you want to delete the task?</span>
        <div class="button_groups">
          <button onclick="deleteTask()">Yes</button>
          <button onclick="cancelDelete()">Cancel</button>
        </div>
      </div>
    </main>
    <!-- FOOTER -->
    <footer id="footer">
      <div class="container">
        &copy; 2023
        <a href="https://instagram.com/shah_samin_yasar" target="_blank"
          >SHAH SAMIN YASAR</a
        >
      </div>
    </footer>

    <!-- Link JS -->
    <script src="script.js"></script>
  </body>
</html>
